name: Sync from luarocks.org

on:
  schedule:
    - cron: '17 6 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: sync-luarocks
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - name: Sync
        shell: pwsh
        run: .github/scripts/sync-luarocks.ps1
